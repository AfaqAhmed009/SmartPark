<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panle</title>
</head>
<style>
/* navigation bar styling */

.navbar{
     height:95px;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 50px;
    background:white;
    border-bottom:1px solid #e5e5e5;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}
.logo-box{
    width:58px;
    height:58px;
    background:#020224;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}



.logo h2{
    font-size:24px;
    font-weight:600;
}

.links{
    display:flex;
    align-items:center;
    gap:25px;
}

.links a{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#282a2f;
    font-size:22px;
    padding:14px 20px;
    border-radius:14px;
    transition:0.3s;
}

.links a svg{
    width:20px;
    height:20px;
}

.links .active{
    background:#f1f3f6;
    color:#111827;
}

.links a:hover{
    background:#f1f3f6;
}


</style>
<body>
      <!-- Navigation bar -->
    <div class="navbar">
        <div class="logo">
            <div class="logo-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-car-front-fill" viewBox="0 0 16 16">

                </svg>
            </div>
                <h2>SmartPark</h2>
        </div>

        <div class="links">

             <a href="#" class="active">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-house-door" viewBox="0 0 16 16">
                <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4z"/>
                </svg>
                
                <span>Home</span>
            </a>    

            <a href="#">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-columns-gap" viewBox="0 0 16 16">
                <path d="M6 1v3H1V1zM1 0a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V1a1 1 0 0 0-1-1zm14 12v3h-5v-3zm-5-1a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1zM6 8v7H1V8zM1 7a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm14-6v7h-5V1zm-5-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V1a1 1 0 0 0-1-1z"/>
                </svg>

                <span>Dashboard</span>
            </a>


             <a href="#">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-calendar" viewBox="0 0 16 16">

               </svg>

            </a>

        </div>

        
    </div>

</body>
</html>

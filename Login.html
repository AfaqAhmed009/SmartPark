<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px 0;
}


.login{
    width:650px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo-box{
    width:80px;
    height:80px;
    background:#000000;
    color:white;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:20px;
}

.logo h2{
    font-size:42px;
    margin-bottom:10px;
}

.logo p{
    color:#777;
    font-size:24px;
}

.login-tabs{
    display:flex;
    margin:30px 0;
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
}

.User_Login,
.Admin_Login{
    width:50%;
    padding:15px;
    border:none;
    cursor:pointer;
    font-size:22px;
}

.User_Login{
    background:#000000;
    color:white;
}

.Admin_Login{
    background:white;
    color:#666;
}

form label{
    display:block;
    font-size:24px;
    font-weight:600;
    margin-bottom:10px;
    margin-top:20px;
}

form input[type="email"],
form input[type="password"]{
    width:100%;
    height:65px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 20px;
    font-size:20px;
    margin-bottom:10px;
    outline:none;
}

.radio{
    display:flex !important;
    justify-content:space-between;
    align-items:center;
    margin:20px 0;
}

.input{
    display:flex;
    align-items:center;
    gap:10px;
}

.input input{
    width:20px;
    height:20px;
}

.input p{
    font-size:18px;
}

.radio a{
    font-size:18px;
}

#Login{
    width:100%;
    height:65px;
    border:none;
    border-radius:14px;
    background:#000000;
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#Login:hover{
    opacity:.9;
}

.or{
    display:flex;
    align-items:center;
    gap:15px;
    margin:30px 0;
    color:#777;
}

.or hr{
    flex:1;
}

.social-buttons{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.google{
    width:50%;
    height:65px;
    border:1px solid #ddd;
    border-radius:12px;
    background:white;
    font-size:24px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.google:hover{
    background:#f7f7f7;
}

.login p:last-child{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:22px;
}

.login p:last-child a{
    font-weight:bold;
}
</style>
<body>
    <div class="login">

        <div class="logo">

            <div class="Form-logo">
                <div class="logo-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25"
                        fill="currentColor" class="bi bi-car-front-fill" viewBox="0 0 16 16">
                        <path d="M2.52 3.515A2.5 2.5 0 0 1 4.82 2h6.362c1 0 1.904.596 2.298 1.515l.792 1.848c.075.175.21.319.38.404.5.25.855.715.965 1.262l.335 1.679q.05.242.049.49v.413c0 .814-.39 1.543-1 1.997V13.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1.338c-1.292.048-2.745.088-4 .088s-2.708-.04-4-.088V13.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1.892c-.61-.454-1-1.183-1-1.997v-.413a2.5 2.5 0 0 1 .049-.49l.335-1.68c.11-.546.465-1.012.964-1.261a.8.8 0 0 0 .381-.404l.792-1.848ZM3 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2m10 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2M6 8a1 1 0 0 0 0 2h4a1 1 0 1 0 0-2z"/>
                    </svg>
                </div>
            </div>

            <h2>Welcome Back</h2>
            <p>Sign in to your SmartPark Account</p>
        </div>
        
        <div class="login-tabs">
            <button class="User_Login">User Login</button>
            <button onclick="redirect_admin()" class="Admin_Login" >Admin Login</button>
        </div>
     <!-- form for data -->

        <form method="post">
           <label for="Email">Email Address</label><br>
            <input type="email" placeholder="You@example.com " id="Email"><br>

            <label for="Password">Password</label><br>
            <input type="password" placeholder="Enter Your Password" id="Password"><br>

           <div style="display: flex;" class="radio">
                <a style="text-decoration: none; color: black;" href="#">Forget password</a>
           </div>
            <button id="Login" type="button" onclick="Login()">Sign in</button>
        </form>


            <div class="or">
                <hr>
                <span>Or continue with</span>
                <hr>
            </div>

            <!--Optios for sign in buttons-->
            <div class="social-buttons">

    <button class="google">
         <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
            <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
            </svg>
        Google
    </button>

    <button class="google">
       <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
        GitHub
    </button>

</div>
         <p>Don't have an acount? <a style="text-decoration: none; color: black;" href="#">Sign up</a></p>
    </div>
</body>

<!-- Java script -->

<script>
    function Login(){
        Email = document.getElementById("Email").value;
        Password = document.getElementById("Password").value;

        fetch("http://127.0.0.1:3000/Login",{
            "method" : "POST",
            "headers" : {
                 "Content-Type" : "application/json"
            },
             body : JSON.stringify({
                Email : Email,
                Password : parseInt(Password)
             })    
        }).then((Response) => Response.json()).then(data => {
            if (data.success){
                window.location.href = "Home.html"; 
            }
            else {
                alret("Invalid creadentials")
            }
        }) 
    }

    function redirect_admin(){
        window.location.href= "Admin.html";
    }
</script>

</html>
